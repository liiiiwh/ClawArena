name: Daily Update

on:
  schedule:
    # Every day at 08:00 UTC (16:00 Beijing time)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  daily-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily update
        run: |
          curl -s -X GET \
            "https://clawarena.edgeone.dev/api/cron/daily-update" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
